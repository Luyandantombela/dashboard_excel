<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay — Content Add-in Test</title>
<script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  body{font-family:sans-serif;margin:0;padding:16px;background:#fff;}
  h3{margin:0 0 10px 0;font-size:14px;}
  button{padding:8px 14px;border-radius:6px;border:none;background:#1E7F5C;color:#fff;font-weight:600;cursor:pointer;margin-right:8px;margin-bottom:8px;}
  #status{margin-top:14px;padding:10px;border-radius:6px;background:#F5F6F8;font-family:monospace;font-size:12px;white-space:pre-wrap;}
</style>
</head>
<body>
  <h3>Content add-in test surface (hidden-sheet bridge)</h3>
  <button onclick="writeValue()">Write test value (from content add-in)</button>
  <button onclick="readValue()">Read current value</button>
  <button onclick="location.reload()" style="background:#12181F;">Force full reload</button>
  <div id="status">Loading…</div>

<script>
Office.onReady(() => {
  readValue();
});

async function writeValue(){
  const statusEl = document.getElementById('status');
  try{
    await Excel.run(async (context)=>{
      const sheets = context.workbook.worksheets;
      sheets.load('items/name');
      await context.sync();
      let hidden = sheets.items.find(s => s.name === '_OverlayData');
      let sheet;
      if(!hidden){
        sheet = sheets.add('_OverlayData');
        sheet.visibility = Excel.SheetVisibility.veryHidden;
      } else {
        sheet = sheets.getItem('_OverlayData');
      }
      const cell = sheet.getRange('A1');
      cell.values = [['Written from CONTENT ADD-IN at ' + new Date().toLocaleTimeString()]];
      await context.sync();
    });
    statusEl.textContent = 'Saved to hidden sheet. Now check the task pane.';
  } catch(err){
    console.error(err);
    statusEl.textContent = 'Write failed: ' + (err.message||err);
  }
}

async function readValue(){
  const statusEl = document.getElementById('status');
  try{
    await Excel.run(async (context)=>{
      const sheets = context.workbook.worksheets;
      sheets.load('items/name');
      await context.sync();
      const hidden = sheets.items.find(s => s.name === '_OverlayData');
      if(!hidden){ statusEl.textContent = 'No hidden sheet exists yet.'; return; }
      const sheet = sheets.getItem('_OverlayData');
      const cell = sheet.getRange('A1');
      cell.load('values');
      await context.sync();
      statusEl.textContent = 'Found value:\n' + cell.values[0][0];
    });
  } catch(err){
    console.error(err);
    statusEl.textContent = 'Read failed: ' + (err.message||err);
  }
}
</script>
</body>
</html>
