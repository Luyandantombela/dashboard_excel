<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="../shared/elements.js"></script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:'Inter',sans-serif;background:#fff;}
  #canvas{position:relative;width:100%;height:100%;overflow:auto;}
  #emptyMsg{padding:40px 20px;text-align:center;color:#9AA2AC;font-size:12px;line-height:1.6;}
</style>
</head>
<body>
<div id="canvas"></div>

<script>
Office.onReady(() => {
  loadAndRender();
  watchForChanges();
});

async function loadAndRender(){
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  try{
    await Excel.run(async (context)=>{
      const sheets = context.workbook.worksheets;
      sheets.load('items/name');
      await context.sync();
      const existing = sheets.items.find(s => s.name === '_OverlayData');
      if (!existing) {
        canvas.innerHTML = '<div id="emptyMsg">No dashboard published yet.</div>';
        return;
      }
      const sheet = sheets.getItem('_OverlayData');
      const cell = sheet.getRange('A1');
      cell.load('values');
      await context.sync();
      const raw = cell.values[0][0];
      if (!raw) {
        canvas.innerHTML = '<div id="emptyMsg">No dashboard published yet.</div>';
        return;
      }
      const arr = JSON.parse(raw);
      arr.forEach(el => {
        const node = OverlayElements.buildNode(el);
        node.style.pointerEvents = 'none'; // read-only surface
        canvas.appendChild(node);
      });
    });
  } catch(err){
    console.error(err);
    canvas.innerHTML = '<div id="emptyMsg">Could not load dashboard.</div>';
  }
}

// Auto-refresh whenever the hidden data sheet changes, from any surface —
// no visible button needed.
async function watchForChanges(){
  try{
    await Excel.run(async (context)=>{
      context.workbook.worksheets.onChanged.add(async (event) => {
        try{
          await Excel.run(async (ctx)=>{
            const ws = ctx.workbook.worksheets.getItem(event.worksheetId);
            ws.load('name');
            await ctx.sync();
            if (ws.name === '_OverlayData') {
              loadAndRender();
            }
          });
        } catch(e){ console.error(e); }
      });
      await context.sync();
    });
  } catch(err){
    console.error('Could not register change watcher:', err);
  }
}
</script>
</body>
</html>
