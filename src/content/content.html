<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="../shared/elements.js"></script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:'Inter',sans-serif;background:#fff;}
  #wrap{position:relative;width:100%;height:100%;overflow:auto;}
  #canvas{position:relative;min-width:100%;min-height:100%;}
  #toolbar{position:sticky;top:0;left:0;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#FAFBFC;border-bottom:1px solid #E4E7EB;z-index:50;}
  #toolbar .label{font-family:'Space Grotesk',sans-serif;font-size:11.5px;font-weight:600;color:#1C232B;}
  #toolbar .sub{font-size:9.5px;color:#9AA2AC;font-family:'JetBrains Mono',monospace;}
  #refreshBtn{background:#12181F;color:#fff;border:none;font-size:10.5px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;}
  #emptyMsg{padding:40px 20px;text-align:center;color:#9AA2AC;font-size:12px;line-height:1.6;}
</style>
</head>
<body>
<div id="wrap">
  <div id="toolbar">
    <div>
      <div class="label">Published dashboard</div>
      <div class="sub" id="publishedAt">—</div>
    </div>
    <button id="refreshBtn" onclick="loadAndRender()">Refresh</button>
  </div>
  <div id="canvas"></div>
</div>

<script>
Office.onReady(() => { loadAndRender(); });

async function loadAndRender(){
  const canvas = document.getElementById('canvas');
  const stamp = document.getElementById('publishedAt');
  canvas.innerHTML = '';
  try{
    await Excel.run(async (context)=>{
      const sheets = context.workbook.worksheets;
      sheets.load('items/name');
      await context.sync();
      const existing = sheets.items.find(s => s.name === '_OverlayData');
      if (!existing) {
        canvas.innerHTML = '<div id="emptyMsg">No dashboard published yet. Open the Overlay task pane, design one, and click Publish.</div>';
        stamp.textContent = 'Nothing published';
        return;
      }
      const sheet = sheets.getItem('_OverlayData');
      const cell = sheet.getRange('A1');
      cell.load('values');
      await context.sync();
      const raw = cell.values[0][0];
      if (!raw) {
        canvas.innerHTML = '<div id="emptyMsg">No dashboard published yet.</div>';
        stamp.textContent = 'Nothing published';
        return;
      }
      const arr = JSON.parse(raw);
      arr.forEach(el => {
        const node = OverlayElements.buildNode(el);
        node.style.pointerEvents = 'none'; // read-only surface
        canvas.appendChild(node);
      });
      stamp.textContent = arr.length + ' element' + (arr.length===1?'':'s') + ' · refreshed ' + new Date().toLocaleTimeString();
    });
  } catch(err){
    console.error(err);
    canvas.innerHTML = '<div id="emptyMsg">Could not load dashboard: ' + (err.message||err) + '</div>';
  }
}
</script>
</body>
</html>
